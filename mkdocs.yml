site_name: AIFont
site_description: AI-powered font design SDK built on FontForge
site_url: https://lamallamadel.github.io/fontforge/
repo_url: https://github.com/lamallamadel/fontforge
repo_name: lamallamadel/fontforge
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: fr
          name: Français
          build: true
          nav_translations:
            Home: Accueil
            Getting Started: Démarrage rapide
            SDK Reference: Référence SDK
            Agents: Agents IA
            API: API REST
            Examples: Exemples
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: quickstart.md
  - SDK Reference:
      - Font: sdk/font.md
      - Glyph: sdk/glyph.md
      - Metrics: sdk/metrics.md
      - Contour: sdk/contour.md
      - SVG Parser: sdk/svg_parser.md
      - Export: sdk/export.md
      - Analyzer: sdk/analyzer.md
  - Agents:
      - Overview: agents/overview.md
      - Orchestrator: agents/orchestrator.md
      - Design Agent: agents/design_agent.md
      - Style Agent: agents/style_agent.md
      - Metrics Agent: agents/metrics_agent.md
      - QA Agent: agents/qa_agent.md
      - Export Agent: agents/export_agent.md
  - API:
      - Overview: api/overview.md
      - Endpoints: api/endpoints.md
  - Examples: examples.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lamallamadel/fontforge
  alternate:
    - name: English
      link: /en/
      lang: en
    - name: Français
      link: /fr/
      lang: fr
