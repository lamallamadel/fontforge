# ── AIFont — Development docker-compose ───────────────────────────────────────
# Usage:
#   cp .env.example .env          # fill in your values
#   docker compose up --build
#
# Services: api · worker · frontend · db · cache · fontforge
# ──────────────────────────────────────────────────────────────────────────────

version: "3.9"

x-common-env: &common-env
  REDIS_URL: redis://cache:6379/0
  DATABASE_URL: postgresql://${POSTGRES_USER:-aifont}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-aifont}
  SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in .env}
  ENVIRONMENT: development

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aifont}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-aifont}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aifont} -d ${POSTGRES_DB:-aifont}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis (cache + Celery broker) ───────────────────────────────────────────
  cache:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── FontForge (Python bindings service) ─────────────────────────────────────
  fontforge:
    build:
      context: .
      dockerfile: docker/fontforge/Dockerfile
    restart: unless-stopped
    environment:
      <<: *common-env
    volumes:
      - font_storage:/app/fonts
      - ./aifont:/app/aifont:ro
    healthcheck:
      test: ["CMD", "python3", "-c", "import fontforge"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── API (FastAPI) ────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: aifont/api/Dockerfile
    restart: unless-stopped
    environment:
      <<: *common-env
      FONTFORGE_SERVICE_URL: http://fontforge:8001
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    volumes:
      - font_storage:/app/fonts
      - ./aifont:/app/aifont:ro   # hot-reload in dev
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    command: >
      uvicorn aifont.api.main:app
        --host 0.0.0.0
        --port 8000
        --reload
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Worker (Celery) ──────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: aifont/worker/Dockerfile
    restart: unless-stopped
    environment:
      <<: *common-env
    volumes:
      - font_storage:/app/fonts
      - ./aifont:/app/aifont:ro   # hot-reload in dev
    depends_on:
      cache:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A aifont.worker.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s

  # ── Frontend (React + Nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  font_storage:
    driver: local
services:
  # ---------------------------------------------------------------------------
  # AIFont API server
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: aifont-api:local
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      # Override with your LLM provider key when using AI agents
      # - OPENAI_API_KEY=sk-...
      # - ANTHROPIC_API_KEY=...
    volumes:
      # Mount source for live-reload during development
      - ./aifont:/app/aifont:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Development tools (only started with --profile dev)
  # ---------------------------------------------------------------------------
  lint:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    volumes:
      - ./aifont:/app/aifont
    working_dir: /app
    command: >
      sh -c "pip install ruff && ruff check aifont/ && ruff format --check aifont/"

  test:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    volumes:
      - ./aifont:/app/aifont
    working_dir: /app
    command: >
      sh -c "pip install pytest pytest-cov && pytest aifont/tests/ --cov=aifont --cov-report=term-missing"
