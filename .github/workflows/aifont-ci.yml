# ============================================================================
# AIFont CI — lint, test and Docker build on every push / pull request
# ============================================================================
# Architecture constraint: FontForge is the frozen underlying engine.
# This workflow validates only the aifont/ Python SDK + agent layer.
# ============================================================================

name: AIFont CI

on:
  push:
    paths:
      - "aifont/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/aifont-ci.yml"
  pull_request:
    paths:
      - "aifont/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/aifont-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # Lint
  # --------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install "ruff>=0.4.0"

      - name: Run ruff linter
        run: ruff check aifont/

      - name: Run ruff formatter check
        run: ruff format --check aifont/

  # --------------------------------------------------------------------------
  # Tests (without fontforge — uses mocks)
  # --------------------------------------------------------------------------
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install aifont (dev extras)
        working-directory: aifont
        run: pip install -e ".[dev]"

      - name: Run pytest with coverage
        run: pytest aifont/tests/ --cov=aifont --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # --------------------------------------------------------------------------
  # Docker build
  # --------------------------------------------------------------------------
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: aifont-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Export to Docker daemon so we can run a smoke test.
          load: true

      - name: Smoke test — container starts
        run: |
          docker run --rm --name aifont-smoke -d \
            -p 8000:8000 \
            aifont-api:ci-${{ github.sha }}
          # Wait for the server to be ready (up to 30 s).
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health 2>/dev/null; then
              echo "Server is up."
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 1
          done
          docker stop aifont-smoke
