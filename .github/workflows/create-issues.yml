name: Create AIFont Project Issues

# GitHub does not have a native "Import issues from CSV" UI feature.
# This workflow is the fastest alternative: it reads issues from
# .github/issues_backlog.csv (Title, Body, Labels) and creates them
# via the GitHub CLI, skipping any that already exist.
#
# CSV format: title,body,labels
# Trigger manually from the Actions tab → "Run workflow".

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Import issues from CSV
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 << 'INNEREOF'
          import csv, subprocess, json, os, sys

          REPO = os.environ["GITHUB_REPOSITORY"]
          CSV_PATH = ".github/issues_backlog.csv"

          # Load issues from CSV (skip blank rows)
          issues = []
          with open(CSV_PATH, newline="", encoding="utf-8") as f:
              reader = csv.DictReader(f)
              for row in reader:
                  title = row["title"].strip()
                  if not title:
                      continue
                  issues.append({
                      "title":  title,
                      "body":   row["body"].strip(),
                      "labels": [l.strip() for l in row.get("labels", "").split(",") if l.strip()],
                  })

          if not issues:
              print(f"ERROR: No issues found in {CSV_PATH}.", file=sys.stderr)
              sys.exit(1)
          print(f"Loaded {len(issues)} issues from {CSV_PATH}.")

          # Get existing issue titles to avoid duplicates
          result = subprocess.run(
              ["gh", "issue", "list", "--state", "all", "--json", "title", "--limit", "200"],
              capture_output=True, text=True, check=False,
          )
          existing = set()
          if result.returncode == 0 and result.stdout.strip():
              existing = {i["title"] for i in json.loads(result.stdout)}
          print(f"Found {len(existing)} existing issues.")

          created = skipped = errors = 0
          for issue in issues:
              if issue["title"] in existing:
                  print(f"  Skip (already exists): {issue['title']}")
                  skipped += 1
                  continue
              cmd = [
                  "gh", "issue", "create",
                  "--repo",  REPO,
                  "--title", issue["title"],
                  "--body",  issue["body"],
              ]
              for label in issue["labels"]:
                  cmd += ["--label", label]
              r = subprocess.run(cmd, capture_output=True, text=True)
              if r.returncode == 0:
                  print(f"  Created: {issue['title']}")
                  created += 1
              else:
                  print(f"  ERROR creating {issue['title']!r}: {r.stderr}", file=sys.stderr)
                  errors += 1

          print(f"\nDone: {created} created, {skipped} skipped, {errors} errors.")
          if errors:
              sys.exit(1)
          INNEREOF
