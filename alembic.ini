# Alembic configuration for AIFont database migrations
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to the migrations directory (relative to this file)
script_location = aifont/migrations

# Template used to generate migration file names.
# %%(rev)s  — revision identifier
# %%(slug)s — brief description slug
file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
# Defaults to the current working directory.
prepend_sys_path = .

# Timezone to use when rendering the date within the migration file
# as well as the filename.
# If specified, requires the python-dateutil library that can be
# installed by adding `dateutil` to the dependencies list.
# timezone =

# Max length of characters to apply to the slug field
truncate_slug_length = 40

# set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without a source .py file to be
# detected as revisions in the versions/ directory
# sourceless = false

# version location specification; This defaults to alembic/versions.
# When using multiple version directories, initial revisions must
# be specified with --version-path.
# The path separator used here should be the separator specified by "version_path_separator" below.
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# version path separator; As mentioned above, this is the character used to split
# version_locations. The default within new alembic.ini files is "os", which uses
# os.pathsep. Note that this has nothing to do with the actual filesystem paths in
# version_locations.
# version_path_separator = os  # Use os.pathsep.
# version_path_separator = :
# version_path_separator = ;
# version_path_separator = space

# set to 'true' to search source files recursively in each "version_locations"
# directory; if false, only source files in "version_locations" itself are
# searched for new migration files.
# new in Alembic version 1.10
# recursive_version_locations = false

# the output encoding used when revision files are written from script.py.mako
# output_encoding = utf-8

# DATABASE_URL is read at runtime from the environment variable.
# Leave this as the token below; env.py substitutes the real URL.
sqlalchemy.url = postgresql+psycopg2://aifont:aifont@localhost:5432/aifont


[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.  See the documentation for further
# detail and examples

# format using "black" - use the console_scripts runner, against the "black" entrypoint
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME


# Logging configuration — uses Python standard logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
