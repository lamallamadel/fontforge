# ---------------------------------------------------------------------------
# Promtail configuration — log shipping agent
# Tails Docker container logs and system logs, enriches them with labels,
# and ships to Loki.
# ---------------------------------------------------------------------------

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576

scrape_configs:

  # ------------------------------------------------------------------
  # Docker container logs
  # Each AIFont service container emits JSON logs (from structured
  # logging) that Promtail forwards as-is.
  # ------------------------------------------------------------------
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: "service"
      - source_labels: ["__meta_docker_container_label_org_label_schema_group"]
        target_label: "group"
    pipeline_stages:
      # Parse the JSON emitted by aifont.monitoring.logging
      - json:
          expressions:
            level: level
            logger: logger
            service: service
            environment: environment
            message: message
      - labels:
          level:
          logger:
          service:
          environment:
      - output:
          source: message

  # ------------------------------------------------------------------
  # System journal / syslog
  # ------------------------------------------------------------------
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          host: aifont-host
          __path__: /var/log/*.log

  # ------------------------------------------------------------------
  # AIFont application log files (when running outside Docker)
  # ------------------------------------------------------------------
  - job_name: aifont-app
    static_configs:
      - targets:
          - localhost
        labels:
          job: aifont
          service: aifont-api
          __path__: /var/log/aifont/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger
            environment: environment
      - labels:
          level:
          logger:
          environment:
